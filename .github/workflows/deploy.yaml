name: Deploy Node.js code on Excloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        run: |
          docker build -t manishr10/learn-devops:latest .
          docker push manishr10/learn-devops:latest

      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.89
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # Stop and remove existing container
            sudo docker rm -f learn-devops || true

            # Pull latest image
            sudo docker pull manishr10/learn-devops:latest

            # Run new container
            sudo docker run -d \
              --name learn-devops \
              --restart unless-stopped \
              -p 8000:8000 \
              manishr10/learn-devops:latest

            # Remove unused images
            sudo docker image prune -f