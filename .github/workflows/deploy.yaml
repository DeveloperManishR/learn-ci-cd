name: Deploy Node.js code on Excloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and push
        run: |
          docker build -t manishr10/learn-devops .
          docker push manishr10/learn-devops

      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.89
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # kill the existing docker conatiner
            sudo docker rm -f manishr10/learn-devops || true

            # Again pull the fresh image from hub 
           sudo docker pull  manishr10/learn-devops

            #Run docker run -d -p 8000:8000 manishr10/learn-devops
           sudo docker run -d --name learn-devops --restart unless-stopped -p 8000:8000 manishr10/learn-devops

            #Clean up old/unused images
            sudo docker image prune -f
