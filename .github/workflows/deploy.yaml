name: Deploy Node js code on excloud

on:
  push:
  branches: -main

  jobs:
    deploy:
    runs: ubuntu-latest

    steps:
    -name: Checkout code
     uses: actions/checkout@v4

    -name: Deploy on excloud
    uses: appleboy/ssh-action@v1.0.3
    with:
    hosts:210.79.128.89 
    username : ubuntu
    key : ${{ secrets.PRIVATE_KEY }}
    script: |
     cd /home/ubuntu/learn-ci-cd
     git pull
     npm i 
     pm2 restart 0
   
